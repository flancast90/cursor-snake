name: Bug report
description: Something is broken in Cursor Arcade.
labels: [bug]
body:
  - type: dropdown
    id: game
    attributes:
      label: Which game?
      options:
        - Snake
        - "2048"
        - Blocks
        - Minesweeper
        - Menu / shell / settings
        - Multiple / unsure
    validations:
      required: true
  - type: textarea
    attributes:
      label: What happened?
      description: What did you see vs. what did you expect?
    validations:
      required: true
  - type: input
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open Arcade  2. Pick Blocks  3. Hold Shift during …"
    validations:
      required: true
  - type: input
    attributes:
      label: Editor + version
      placeholder: "Cursor 0.x on macOS 15, or VS Code 1.x on Linux"
    validations:
      required: true
  - type: input
    attributes:
      label: Extension version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Settings used
      description: Difficulty, mode, board size, theme — if relevant.
