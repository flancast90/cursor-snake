<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <rect width="128" height="128" fill="#ffffff"/>
  <!-- Four games, four quadrants -->
  <!-- Top-left: Snake (curve) -->
  <path d="M22 30 H36 A6 6 0 0 1 42 36 V42 A6 6 0 0 0 48 48 H58" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="58" cy="48" r="2.5" fill="#0a0a0a"/>
  <!-- Top-right: 2048 tiles -->
  <rect x="70" y="22" width="18" height="18" rx="2" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
  <rect x="90" y="22" width="18" height="18" rx="2" fill="#0a0a0a"/>
  <rect x="70" y="42" width="18" height="18" rx="2" fill="#0a0a0a"/>
  <rect x="90" y="42" width="18" height="18" rx="2" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
  <!-- Bottom-left: Blocks (tetromino) -->
  <rect x="22" y="72" width="14" height="14" fill="#0a0a0a"/>
  <rect x="36" y="72" width="14" height="14" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
  <rect x="36" y="86" width="14" height="14" fill="#0a0a0a"/>
  <rect x="36" y="100" width="14" height="14" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
  <!-- Bottom-right: Minesweeper grid w/ mine -->
  <rect x="70" y="74" width="38" height="38" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
  <line x1="70" y1="86.7" x2="108" y2="86.7" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="70" y1="99.3" x2="108" y2="99.3" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="82.7" y1="74" x2="82.7" y2="112" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="95.3" y1="74" x2="95.3" y2="112" stroke="#0a0a0a" stroke-width="1.5"/>
  <circle cx="89" cy="93" r="4" fill="#0a0a0a"/>
</svg>
