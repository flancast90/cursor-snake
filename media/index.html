<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="{{csp}}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Arcade</title>
    <link rel="stylesheet" href="{{styleUri}}" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="topbar">
        <button id="btnMenu" class="link" aria-label="Back to menu" title="Back to menu (Esc)">
          <span class="brand">Cursor Arcade</span>
        </button>
        <nav class="stats" id="stats" aria-live="polite"></nav>
        <div class="actions">
          <button id="btnPause" class="link hidden" title="Pause (Space)">Pause</button>
          <button id="btnRestart" class="link hidden" title="Restart (R)">Restart</button>
          <button id="btnSettings" class="link" aria-label="Settings" title="Settings">Settings</button>
        </div>
      </header>

      <!-- Main Menu -->
      <section id="menu" class="menu">
        <div class="menu-inner">
          <h1 class="hero">Pick a game.</h1>
          <p class="hero-sub">Eight minimalist classics. Keyboard only. No ads, no trackers, no nonsense.</p>
          <div class="game-grid" id="gameGrid" role="list"></div>
          <p class="menu-tip">Press a game's number key to jump in. <kbd>Esc</kbd> always returns here.</p>
        </div>
      </section>

      <!-- Game host -->
      <section id="stage" class="stage hidden" aria-label="Game stage">
        <div id="gameHost" class="game-host"></div>
        <div id="overlay" class="overlay hidden">
          <div class="overlay-inner">
            <h2 id="overlayTitle">Paused</h2>
            <p id="overlaySub">Press Space to resume.</p>
            <div id="overlayActions" class="overlay-actions">
              <button id="overlayPrimary" class="btn">Resume</button>
              <button id="overlaySecondary" class="btn ghost">Back to menu</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Settings drawer -->
      <aside id="settings" class="settings hidden" aria-hidden="true">
        <div class="settings-inner">
          <header class="settings-head">
            <h2>Settings</h2>
            <button id="btnCloseSettings" class="link">Close</button>
          </header>
          <div id="settingsBody" class="settings-body"></div>
          <footer class="settings-foot">
            <button id="btnResetHS" class="link danger">Reset all high scores</button>
          </footer>
        </div>
      </aside>
    </div>

    <script nonce="{{nonce}}" src="{{snakeUri}}"></script>
    <script nonce="{{nonce}}" src="{{twenty48Uri}}"></script>
    <script nonce="{{nonce}}" src="{{blocksUri}}"></script>
    <script nonce="{{nonce}}" src="{{sweeperUri}}"></script>
    <script nonce="{{nonce}}" src="{{soccerUri}}"></script>
    <script nonce="{{nonce}}" src="{{capitalistUri}}"></script>
    <script nonce="{{nonce}}" src="{{pongUri}}"></script>
    <script nonce="{{nonce}}" src="{{tictactoeUri}}"></script>
    <script nonce="{{nonce}}" src="{{arcadeJsUri}}"></script>
  </body>
</html>
